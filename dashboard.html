<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Safe Guard - Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 30px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-clear {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
    }

    .btn-clear:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-clear:active {
      transform: translateY(0);
    }

    .btn-export {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .btn-export:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.5);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 8px;
    }

    .stat-subtitle {
      font-size: 12px;
      color: #cbd5e1;
    }

    .stat-card.danger .stat-value {
      color: #ef4444;
    }

    .stat-card.warning .stat-value {
      color: #f97316;
    }

    .stat-card.safe .stat-value {
      color: #10b981;
    }

    /* Logs Table */
    .logs-section {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      overflow-x: auto;
    }

    .logs-section h2 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logs-section h2::before {
      content: "";
      width: 3px;
      height: 18px;
      background: #3b82f6;
      border-radius: 1px;
    }

    .logs-empty {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      border-bottom: 2px solid rgba(148, 163, 184, 0.2);
    }

    th {
      text-align: left;
      padding: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      font-size: 13px;
    }

    tbody tr:hover {
      background: rgba(59, 130, 246, 0.05);
    }

    .risk-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
      text-align: center;
    }

    .risk-badge.safe {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .risk-badge.medium {
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .risk-badge.suspicious {
      background: rgba(249, 115, 22, 0.2);
      color: #f97316;
      border: 1px solid rgba(249, 115, 22, 0.3);
    }

    .risk-badge.dangerous {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .url-cell {
      max-width: 300px;
      word-break: break-all;
      color: #93c5fd;
    }

    .time-cell {
      color: #94a3b8;
      font-size: 12px;
    }

    /* Pagination */
    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .pagination button {
      padding: 6px 12px;
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pagination button:hover {
      background: rgba(59, 130, 246, 0.25);
    }

    .pagination button.active {
      background: #3b82f6;
      color: white;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-info {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin: 12px 0;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Details Row */
    .details-row {
      background: rgba(59, 130, 246, 0.05);
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      font-size: 12px;
      color: #cbd5e1;
      display: none;
    }

    .details-row.shown {
      display: block;
    }

    .detail-item {
      margin: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px;
      }

      h1 {
        font-size: 20px;
      }

      .url-cell {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>🛡️ AI Safe Guard Dashboard</h1>
      <p class="subtitle">Security logs and threat analysis</p>
    </header>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-export" id="autoRefreshBtn">🔄 Auto Refresh</button>
      <button class="btn-export" id="exportBtn">📥 Export Logs</button>
      <button class="btn-clear" id="clearBtn">❌ Clear All</button>
    </div>

    <!-- Statistics -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Events</div>
        <div class="stat-value" id="totalEvents">0</div>
        <div class="stat-subtitle">Since extension installed</div>
      </div>

      <div class="stat-card safe">
        <div class="stat-label">Safe</div>
        <div class="stat-value" id="safeCount">0</div>
        <div class="stat-subtitle">Score 0-34</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Medium Risk</div>
        <div class="stat-value" id="mediumCount">0</div>
        <div class="stat-subtitle">Score 35-59</div>
      </div>

      <div class="stat-card warning">
        <div class="stat-label">Suspicious</div>
        <div class="stat-value" id="suspiciousCount">0</div>
        <div class="stat-subtitle">Score 60-84</div>
      </div>

      <div class="stat-card danger">
        <div class="stat-label">Dangerous</div>
        <div class="stat-value" id="dangerousCount">0</div>
        <div class="stat-subtitle">Score 85-100</div>
      </div>
    </div>

    <!-- Logs Section -->
    <div class="logs-section">
      <h2>Security Events Log</h2>
      <div id="logsContainer">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading logs...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
